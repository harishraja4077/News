<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found — Stackly News</title>
    <meta name="description" content="The story or frequency you requested could not be located on the Stackly News server network.">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Favicon -->
    <link rel="icon" href="images/logo.webp" type="image/webp">
</head>
<body>

    <!-- SEARCH OVERLAY -->
    <div class="search-overlay" id="search-overlay">
        <button class="search-close" id="close-search">&times;</button>
        <div class="search-container">
            <div class="search-input-wrapper">
                <input type="text" placeholder="Search stories, topics, reporters...">
                <button type="submit"><i class="fas fa-search"></i></button>
            </div>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Press ESC to exit search menu</p>
        </div>
    </div>

    <!-- HEADER -->
    <header>
        <div class="container header-container">
            <!-- Branding -->
            <a href="index.html" class="logo">
                <img src="images/logo.webp" alt="Stackly Logo">
            </a>

            <!-- Navigation Links -->
            <nav id="nav-menu">
                <div class="nav-links">
                    <a href="index.html">Home</a>
                    <a href="about.html">About</a>
                    <a href="service.html">Services</a>
                    <a href="blog.html">Blog</a>
                    <a href="contact.html">Contact</a>
                    <a href="login.html" class="btn btn-outline" style="padding: 0.5rem 1.25rem;">Log In</a>
                </div>
            </nav>

            <!-- Actions Controls -->
            <div class="header-actions">
                <button class="btn btn-icon" id="open-search" aria-label="Open Search"><i class="fas fa-search"></i></button>
                <button class="btn btn-icon" id="theme-toggle" aria-label="Toggle Theme"><i class="fas fa-sun"></i></button>
                <div class="menu-toggle" id="mobile-menu">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </header>

    <!-- ERROR WRAPPER -->
    <main class="error-wrapper">
        <div class="error-bg-shapes">
            <div class="error-shape"></div>
            <div class="error-shape"></div>
        </div>
        
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Frequency Offline</h2>
        <p class="error-desc">The specific editorial database or briefing article you requested could not be reached. It may have been archived or moved to a different url.</p>
        
        <div style="display: flex; gap: 1rem; z-index: 2;">
            <a href="index.html" class="btn btn-primary"><i class="fas fa-home"></i> Return to News Hub</a>
            <a href="contact.html" class="btn btn-outline"><i class="fas fa-paper-plane"></i> Report Offline Link</a>
        </div>
    </main>

    

    <!-- Scripts -->
    <script src="js/script.js"></script>
</body>
</html>
